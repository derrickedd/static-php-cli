name: CI on x86_64 Windows

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: php version to compile
        default: '8.4'
        type: choice
        options:
          - '8.4'
          - '8.3'
          - '8.2'
          - '8.1'
          - '8.0'
      build-cli:
        description: build cli binary
        default: true
        type: boolean
      build-micro:
        description: build phpmicro binary
        type: boolean
      extensions:
        description: extensions to compile (comma separated)
        required: true
        # REMINDER: Remove pcntl and posix for Windows builds!
        default: "apcu,bcmath,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,gd,iconv,mbstring,mysqli,mysqlnd,opcache,openssl,pdo,pdo_mysql,pdo_sqlite,phar,readline,redis,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,xsl,zip,zlib"
        type: string
      prefer-pre-built:
        description: prefer pre-built binaries
        type: boolean
        default: true
      debug:
        description: enable debug logs
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: build ${{ inputs.version }} on Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup PHP to run the 'spc' tool itself
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' 
          extensions: mbstring, curl, openssl

      - id: cache-composer-deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-dependencies

      - if: steps.cache-composer-deps.outputs.cache-hit != 'true'
        run: composer update --no-dev --classmap-authoritative

      - name: Generate hashed key for download cache
        shell: bash
        run: |
          INPUT_HASH=$(echo "${{ runner.os }}-${{ inputs.version }}-${{ inputs.extensions }}" | sha256sum | awk '{print $1}')
          echo "INPUT_HASH=${INPUT_HASH}" >> "$GITHUB_ENV"

      - id: cache-download
        uses: actions/cache@v4
        with:
          path: downloads
          key: php-${{ env.INPUT_HASH }}

      # 2. Correctly setting Env Vars using PowerShell syntax (default on Windows)
      - name: Set Build Arguments
        run: |
          if ("${{ inputs.debug }}" -eq "true") { echo "SPC_BUILD_DEBUG=--debug" >> $env:GITHUB_ENV }
          if ("${{ inputs.prefer-pre-built }}" -eq "true") { echo "SPC_PRE_BUILT=--prefer-pre-built" >> $env:GITHUB_ENV }
          if ("${{ inputs.build-cli }}" -eq "true") { echo "SPC_BUILD_CLI=--build-cli" >> $env:GITHUB_ENV }
          if ("${{ inputs.build-micro }}" -eq "true") { echo "SPC_BUILD_MICRO=--build-micro" >> $env:GITHUB_ENV }

      - run: php bin/spc doctor

      - if: steps.cache-download.outputs.cache-hit != 'true'
        run: php bin/spc download --with-php="${{ inputs.version }}" --for-extensions="${{ inputs.extensions }}" ${{ env.SPC_BUILD_DEBUG }} ${{ env.SPC_PRE_BUILT }}

      # 3. Running the build (Note: 'php' prefix ensures it uses the setup-php version)
      - run: php bin/spc build "${{ inputs.extensions }}" ${{ env.SPC_BUILD_DEBUG }} ${{ env.SPC_BUILD_CLI }} ${{ env.SPC_BUILD_MICRO }}

      - if: ${{ inputs.build-cli == true }}
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-windows
          path: buildroot/bin/php.exe

      - if: ${{ inputs.build-micro == true }}
        uses: actions/upload-artifact@v4
        with:
          name: micro-${{ inputs.version }}-windows
          path: buildroot/bin/micro.sfx
