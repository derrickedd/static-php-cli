name: CI on Windows (x86_64)

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "PHP version"
        default: '8.4'
        type: choice
        options: ['8.4', '8.3', '8.2', '8.1']
      build-cli:
        default: true
        type: boolean
      build-micro:
        default: true
        type: boolean
      extensions:
        description: "Windows-Safe Extensions"
        required: true
        # Removed: pcntl, posix, readline, xsl, dba, redis, apcu
        default: "bcmath,calendar,ctype,curl,dom,exif,fileinfo,filter,gd,iconv,mbstring,mysqli,mysqlnd,opcache,openssl,pdo,pdo_mysql,pdo_sqlite,phar,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib"
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, curl, openssl

      - name: Install Tool
        run: composer update --no-dev --classmap-authoritative

      - name: SPC Doctor
        run: php bin/spc doctor

      - name: Download Sources
        run: php bin/spc download --with-php="${{ inputs.version }}" --for-extensions="${{ inputs.extensions }}" --prefer-pre-built

      - name: Run Build
        id: build-step
        run: php bin/spc build "${{ inputs.extensions }}" --build-cli --build-micro

      # NEW: This will help us see EXACTLY what went wrong if it fails again
      - name: Dump Logs on Failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path "log/spc.output.log") {
            Write-Host "--- LAST 100 LINES OF SPC OUTPUT LOG ---"
            Get-Content "log/spc.output.log" -Tail 100
          }
          if (Test-Path "log/spc.shell.log") {
            Write-Host "--- LAST 100 LINES OF SHELL LOG ---"
            Get-Content "log/spc.shell.log" -Tail 100
          }

      - name: Upload PHP CLI
        if: success() && inputs.build-cli
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-windows
          path: buildroot/bin/php.exe

      - name: Upload Micro SAPI
        if: success() && inputs.build-micro
        uses: actions/upload-artifact@v4
        with:
          name: micro-${{ inputs.version }}-windows
          path: buildroot/bin/micro.sfx
