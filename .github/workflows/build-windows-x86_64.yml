name: CI on Windows (x86_64)

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "PHP version"
        default: '8.4'
        type: choice
        options: ['8.4', '8.3', '8.2', '8.1']
      extensions:
        description: "Stable Extension List for NativePHP"
        required: true
        default: "ctype,curl,dom,fileinfo,filter,iconv,mbstring,mysqli,mysqlnd,opcache,openssl,pdo,pdo_mysql,pdo_sqlite,phar,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib"
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP (Runner Environment)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, curl, openssl

      - name: Install static-php-cli
        run: composer update --no-dev --classmap-authoritative

      - name: Run Doctor
        run: php bin/spc doctor

      - name: Download Sources
        # This will fetch PHP and all required C libraries (zlib, openssl, etc.)
        run: php bin/spc download --with-php="${{ inputs.version }}" --for-extensions="${{ inputs.extensions }}" --prefer-pre-built

      - name: Run Build
        # --disable-opcache-jit fixes the 'gen_ir_fold_hash.exe' error on Windows
        # --build-cli creates php.exe
        # --build-micro creates micro.sfx (needed for NativePHP standalone)
        run: php bin/spc build "${{ inputs.extensions }}" --build-cli --build-micro --disable-opcache-jit --debug

      - name: Debug Logs on Failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path "log/spc.output.log") { Get-Content "log/spc.output.log" -Tail 200 }
          if (Test-Path "log/spc.shell.log") { Get-Content "log/spc.shell.log" -Tail 200 }

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-windows-static
          path: |
            buildroot/bin/php.exe
            buildroot/bin/micro.sfx
