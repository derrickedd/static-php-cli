name: CI on Windows (x86_64)

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "PHP version"
        default: '8.4'
        type: choice
        options: ['8.4', '8.3', '8.2', '8.1']

env:
  # Strictly defined list to avoid the bz2/zip conflict on Windows
  STABLE_EXTS: "ctype,curl,dom,fileinfo,filter,iconv,mbstring,mysqli,mysqlnd,opcache,openssl,pdo,pdo_mysql,pdo_sqlite,phar,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP (Runner Environment)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, curl, openssl

      - name: Install static-php-cli
        run: composer update --no-dev --classmap-authoritative

      - name: Run Doctor
        run: php bin/spc doctor

      - name: Download Sources
        run: php bin/spc download --with-php="${{ inputs.version }}" --for-extensions="${{ env.STABLE_EXTS }}" --prefer-pre-built

      - name: Run Build
        # --with-clean: Forces a fresh config to drop the problematic 'bz2' extension
        # --disable-opcache-jit: Prevents the JIT compiler build error
        run: php bin/spc build "${{ env.STABLE_EXTS }}" --build-cli --build-micro --disable-opcache-jit --with-clean --debug

      - name: Debug Logs on Failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path "log/spc.output.log") { Get-Content "log/spc.output.log" -Tail 200 }
          if (Test-Path "log/spc.shell.log") { Get-Content "log/spc.shell.log" -Tail 200 }

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-windows-static
          path: |
            buildroot/bin/php.exe
            buildroot/bin/micro.sfx
