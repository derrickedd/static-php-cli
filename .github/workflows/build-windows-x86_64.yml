name: CI on Windows (x86_64)

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "PHP version"
        default: '8.4'
        type: choice
        options: ['8.4', '8.3', '8.2', '8.1']
      extensions:
        description: "Stabilized Windows List"
        required: true
        # Removed problematic GD and BZ2 to fix the ZLIB linking error
        default: "ctype,curl,dom,fileinfo,filter,iconv,mbstring,mysqli,mysqlnd,opcache,openssl,pdo,pdo_mysql,pdo_sqlite,phar,session,simplexml,sockets,sodium,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib"
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, curl, openssl

      - name: Install Tool
        run: composer update --no-dev --classmap-authoritative

      - name: SPC Doctor
        run: php bin/spc doctor

      - name: Download Sources
        run: php bin/spc download --with-php="${{ inputs.version }}" --for-extensions="${{ inputs.extensions }}" --prefer-pre-built

      - name: Run Build
        # Added --debug to get the most information possible
        run: php bin/spc build "${{ inputs.extensions }}" --build-cli --build-micro --debug

      - name: Dump Logs on Failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path "log/spc.output.log") { Get-Content "log/spc.output.log" -Tail 200 }
          if (Test-Path "log/spc.shell.log") { Get-Content "log/spc.shell.log" -Tail 200 }

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.version }}-windows-native
          path: |
            buildroot/bin/php.exe
            buildroot/bin/micro.sfx
